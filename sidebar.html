<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
		<script src="sidebar.js"></script>
		<link rel="stylesheet" href="sidebar.css" />
		<link rel="shortcut icon" href="icons/sidebar.ico" />
		<title>Sidebar</title>
	</head>
	<body class="v-flex">
		<div id="notes-page" class="page">
			<div class="h-flex">
				<button id="erase">Erase</button>
				<button id="ids">IDs<div id="id-list"></div></button>
				<button id="add">Add</button>
			</div>
			<textarea></textarea>
			<table id="employees-table">
				<thead>
					<tr><th>Name</th><th>Number</th></tr>
				</thead>
				<tbody>
				</tbody>
			</table>
			<div id="links-grid">
			</div>
			<div class="h-flex" id="add-buttons-container">
				<button id="add-link">New Link</button>
				<button id="add-employee">New Employee</button>
			</div>
		</div>
		<div id="calc-page" class="page hidden">
			<h2>Calculator</h2>
			<textarea id="calculator-textarea"></textarea>
			<button id="calculate-total">Calculate</button>
			<span></span>
		</div>
		<div id="holds-page" class="page hidden">
			<h2>Holds Calculator</h2>
			<div class="h-flex">
				<span>Amount</span>
				<input id="amount" value="0.00">
			</div>
			<div class="h-flex">
				<span>Extended?</span>
				<input id="extended" type="checkbox" value="false">
			</div>
			<button id="calculate-hold">Calculate Hold</button>
			<h3>Holds</h3>
			<table id="holds-list">
				<thead><tr><th>Type</th><th>Amount</th><th>Expires</th></tr></thead>
				<tbody></tbody>
			</table>
			
		</div>
		<div id="options-page" class="page hidden">
			<h2>Options</h2>
			<div class="h-flex">
				<button id="load-ids">Load IDs</button>
				<button id="export-ids">Export IDs</button>
			</div>
			<div class="h-flex">
				<button id="load-links">Load Links</button>
				<button id="export-links">Export Links</button>
			</div>
			<div class="h-flex">
				<button id="load-employees">Load Employees</button>
				<button id="export-employees">Export Employees</button>
			</div>
			<div class="h-flex">
				<button id="theme-switcher">Dark Mode</button>
			</div>
			<div class="h-flex">
				<input type="number" min="1" max="2" step="0.01" value="1.00">
				<button id="apply-font-changes">Apply</button>
			</div>
			<span id="sample-text">Sample Text</span>
		</div>
		<div id="add-link-popup" class="popout hidden">
			<h2>Create Link</h2>
			<div class="grid">
				<span>Name</span><input id="add-link-name">
				<span>Link</span><input id="add-link-link">
				<span>Image</span><input id="add-link-image" type="file">
				<button id="create-link">Create</button><button id="cancel-link">Cancel</button>
			</div>
		</div>
		<div id="add-employee-popup" class="popout hidden">
			<h2>Create Employee</h2>
			<div class="grid">
				<span>Name</span><input>
				<span>Number</span><input>
				<span>Color</span><input type="color">
				<button>Create</button><button>Cancel</button>
			</div>
		</div>
		<footer>
			<button>Notes</button>
			<button>Calculator</button>
			<button>Holds</button>
			<button>Options</button>
		</footer>
	</body>
</html>
